<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Crossing Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 30px 20px;
}

h1 {
  font-weight: 600;
}

.chat {
  border: 1px solid #30363d;
  background: #11161c;
  padding: 15px;
  height: 400px;
  overflow-y: auto;
  margin-bottom: 15px;
}

.input-row {
  display: flex;
}

input {
  flex: 1;
  padding: 12px;
  background: #0d1117;
  border: 1px solid #30363d;
  color: white;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2ea043;
}

.message-ai {
  color: #58a6ff;
  margin-top: 8px;
}

.message-user {
  color: #e6edf3;
  margin-top: 8px;
}

nav {
  margin-bottom: 20px;
}

nav a {
  color: #58a6ff;
  text-decoration: none;
}

nav a:hover {
  text-decoration: underline;
}

</style>

</head>

<body>

<div class="container">

<nav>
<a href="/">Home</a>
</nav>

<h1>Crossing Assistant</h1>

<p>
AI relocation assistant helping individuals navigate international relocation,
visas, legal requirements, and practical transition logistics.
</p>

<div id="chat" class="chat">

<div class="message-ai">
<b>Crossing:</b> Hello. Ask me anything about relocation.
</div>

</div>

<div class="input-row">

<input
id="input"
placeholder="Ask about relocation..."
onkeypress="if(event.key==='Enter') sendMessage();"
/>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

function sendMessage() {

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value.trim();

  if (!message) return;

  chat.innerHTML += "<div class='message-user'><b>You:</b> " + message + "</div>";

  input.value = "";

  const encoded = encodeURIComponent(
    "You are Crossing, a professional AI relocation assistant. Help users relocate internationally safely and efficiently.\n\nUser: " + message
  );

  const url = "https://chat.openai.com/?q=" + encoded;

  chat.innerHTML += "<div class='message-ai'><b>Crossing:</b> Opening secure AI session...</div>";

  chat.scrollTop = chat.scrollHeight;

  window.open(url, "_blank");

}

</script>

</body>
</html>
