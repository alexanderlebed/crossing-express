<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Crossing Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui;
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

#chat {
  border: 1px solid #000;
  padding: 20px;
  height: 400px;
  overflow-y: auto;
  margin-bottom: 20px;
}

input {
  width: 80%;
  padding: 10px;
}

button {
  padding: 10px;
}
</style>

</head>

<body>

<h1>Crossing Assistant</h1>

<div id="chat"></div>

<input id="input" placeholder="Ask about relocation..." />
<button onclick="send()">Send</button>

<script>

const API_KEY = "PASTE_YOUR_OPENAI_API_KEY_HERE";

async function send() {

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value;

  chat.innerHTML += "<p><b>You:</b> " + message + "</p>";

  const response = await fetch("https://api.openai.com/v1/chat/completions", {

    method: "POST",

    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },

    body: JSON.stringify({

      model: "gpt-4o-mini",

      messages: [

        {
          role: "system",
          content: "You are Crossing, an AI relocation assistant helping people move between countries safely and intelligently."
        },

        {
          role: "user",
          content: message
        }

      ]

    })

  });

  const data = await response.json();

  const reply = data.choices[0].message.content;

  chat.innerHTML += "<p><b>Crossing:</b> " + reply + "</p>";

  input.value = "";

}

</script>

</body>
</html>
