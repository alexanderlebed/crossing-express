<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Country Observatory — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:80px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
}

.box{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
}

.score{
font-size:40px;
margin-top:10px;
color:#4f8cff;
}

.vector{
margin-top:10px;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

select{
width:100%;
padding:12px;
margin-top:20px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.1);
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1 id="countryName">Country</h1>

<p class="subtitle">
SVI analytical country profile within the SRIM jurisdiction modeling framework.
</p>


<select id="countrySelect"></select>



<div class="box">

<h3>Sovereign Volatility Index</h3>

<div class="score" id="sviScore"></div>

<div id="sviClass"></div>

</div>



<div class="box">

<h3>Core Vectors</h3>

<div class="vector"><strong>Tax Pressure:</strong> <span id="tax"></span></div>

<div class="vector"><strong>Migration Accessibility:</strong> <span id="migration"></span></div>

<div class="vector"><strong>Residency Path:</strong> <span id="residency"></span></div>

<div class="vector"><strong>Geopolitical Risk:</strong> <span id="geo"></span></div>

<div class="vector"><strong>Crime & Safety:</strong> <span id="crime"></span></div>

</div>



<div class="box">

<h3>Mobility Score</h3>

<div class="score" id="mobility"></div>

</div>



<div class="footer">

Crossing — Strategic Navigation Laboratory<br>

<a href="/">Return to Home</a>

</div>

</div>



<script src="/data/countries.js"></script>

<script>

function getCountryFromURL(){

let params=new URLSearchParams(window.location.search)

return params.get("c")

}



function loadCountry(key){

let c=COUNTRIES[key]

if(!c)return

document.getElementById("countryName").innerText=c.name

document.getElementById("sviScore").innerText=c.svi

document.getElementById("sviClass").innerText=c.class

document.getElementById("tax").innerText=c.tax

document.getElementById("migration").innerText=c.migration

document.getElementById("residency").innerText=c.residency

document.getElementById("geo").innerText=c.geo

document.getElementById("crime").innerText=c.crime

document.getElementById("mobility").innerText=(100-c.svi)+"/100"

}



function populateCountries(){

let select=document.getElementById("countrySelect")

for(let key in COUNTRIES){

let option=document.createElement("option")

option.value=key

option.text=COUNTRIES[key].name

select.appendChild(option)

}

}



populateCountries()



let key=getCountryFromURL() || "spain"



document.getElementById("countrySelect").value=key

loadCountry(key)



document.getElementById("countrySelect").addEventListener("change",function(){

let k=this.value

loadCountry(k)

history.replaceState(null,null,"?c="+k)

})

</script>

</body>
</html>
