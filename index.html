<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Crossing — AI Relocation Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #05070f;
  color: #e8ecf1;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 60px 30px;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

p {
  opacity: 0.8;
}

.form-group {
  margin-top: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  background: #0d1117;
  border: 1px solid #30363d;
  color: white;
  margin-top: 5px;
  font-size: 14px;
}

button {
  margin-top: 30px;
  padding: 14px 28px;
  background: linear-gradient(90deg, #4f8cff, #7a5cff);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  font-size: 16px;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 40px;
  padding: 25px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  white-space: pre-wrap;
}

.loader {
  margin-top: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Relocation Strategy</h1>
<p>Structured relocation decision engine powered by AI modeling.</p>

<div class="form-group">
<label>Citizenship</label>
<input id="citizenship" placeholder="e.g. Russia, Germany, USA">
</div>

<div class="form-group">
<label>Target Country (optional)</label>
<input id="target" placeholder="e.g. Spain, Portugal">
</div>

<div class="form-group">
<label>Monthly Income (€)</label>
<input id="income" type="number" placeholder="e.g. 4000">
</div>

<div class="form-group">
<label>Family Status</label>
<select id="family">
<option value="single">Single</option>
<option value="married">Married</option>
<option value="married_children">Married with children</option>
</select>
</div>

<div class="form-group">
<label>Timeline</label>
<select id="timeline">
<option value="3_months">Within 3 months</option>
<option value="6_months">Within 6 months</option>
<option value="12_months">Within 12 months</option>
</select>
</div>

<button onclick="generate()">Generate Strategy</button>

<div id="loading" class="loader" style="display:none;">
Computing relocation model...
</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>

async function generate() {

  const citizenship = document.getElementById("citizenship").value;
  const targetCountry = document.getElementById("target").value;
  const income = document.getElementById("income").value;
  const familyStatus = document.getElementById("family").value;
  const timeline = document.getElementById("timeline").value;

  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";

  try {

    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        citizenship,
        targetCountry,
        income,
        familyStatus,
        timeline
      })
    });

    const data = await response.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";

    if (data.result) {
      document.getElementById("result").innerText = data.result;
    } else {
      document.getElementById("result").innerText = "Error: " + JSON.stringify(data);
    }

  } catch (err) {

    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerText = "Connection error: " + err.message;

  }
}

</script>

</body>
</html>
