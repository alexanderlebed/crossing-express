<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Crossing — AI Relocation Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #05070f;
  color: #e8ecf1;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}
.container {
  max-width: 800px;
  margin: auto;
  padding: 60px 30px;
}
input, select {
  width: 100%;
  padding: 12px;
  background: #0d1117;
  border: 1px solid #30363d;
  color: white;
  margin-top: 10px;
}
button {
  margin-top: 30px;
  padding: 14px 28px;
  background: linear-gradient(90deg, #4f8cff, #7a5cff);
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
button:hover {
  opacity: 0.9;
}
.result {
  margin-top: 40px;
  padding: 25px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  white-space: pre-wrap;
}
.loader {
  margin-top: 20px;
}
.pay-btn {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Relocation Strategy</h1>

<input id="citizenship" placeholder="Citizenship">
<input id="target" placeholder="Target Country">
<input id="income" type="number" placeholder="Monthly Income (€)">
<select id="family">
<option value="single">Single</option>
<option value="married">Married</option>
<option value="married_children">Married with children</option>
</select>
<select id="timeline">
<option value="3_months">Within 3 months</option>
<option value="6_months">Within 6 months</option>
<option value="12_months">Within 12 months</option>
</select>

<button onclick="generate()">Generate Strategy</button>

<div id="loading" class="loader" style="display:none;">
Computing relocation model...
</div>

<div id="result" class="result" style="display:none;"></div>

<button id="payBtn" class="pay-btn" onclick="buyFullReport()">
Unlock Full Strategy (€79)
</button>

</div>

<script>

async function generate() {

  const loading = document.getElementById("loading");
  const resultBox = document.getElementById("result");
  const payBtn = document.getElementById("payBtn");

  loading.style.display = "block";
  resultBox.style.display = "none";
  payBtn.style.display = "none";

  try {

    const response = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        citizenship: document.getElementById("citizenship").value,
        targetCountry: document.getElementById("target").value,
        income: document.getElementById("income").value,
        familyStatus: document.getElementById("family").value,
        timeline: document.getElementById("timeline").value
      })
    });

    const text = await response.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      throw new Error("Server did not return valid JSON:\n\n" + text);
    }

    loading.style.display = "none";
    resultBox.style.display = "block";

    resultBox.innerText = data.result || JSON.stringify(data, null, 2);

    // показать кнопку оплаты
    payBtn.style.display = "inline-block";

  } catch (err) {

    loading.style.display = "none";
    resultBox.style.display = "block";
    resultBox.innerText = "Error:\n\n" + err.message;

  }
}

async function buyFullReport() {

  try {

    const response = await fetch("/api/checkout", {
      method: "POST"
    });

    const data = await response.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Payment session error.");
    }

  } catch (err) {
    alert("Payment error: " + err.message);
  }

}

</script>

</body>
</html>
