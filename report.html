<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SRIM Entry Sovereign Scan — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #05070f;
  color: #e8ecf1;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 60px 30px;
}

input, select {
  width: 100%;
  padding: 12px;
  background: #0d1117;
  border: 1px solid #30363d;
  color: white;
  margin-top: 10px;
}

button {
  margin-top: 30px;
  padding: 14px 28px;
  background: linear-gradient(90deg, #4f8cff, #7a5cff);
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.result {
  margin-top: 40px;
  padding: 25px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  white-space: pre-wrap;
}

.loader {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>SRIM Entry Sovereign Scan</h1>

<input id="citizenship" placeholder="Citizenship">
<input id="target" placeholder="Target Country">
<input id="income" type="number" placeholder="Monthly Income (€)">
<select id="family">
<option value="single">Single</option>
<option value="married">Married</option>
<option value="married_children">Married with children</option>
</select>
<select id="timeline">
<option value="3_months">Within 3 months</option>
<option value="6_months">Within 6 months</option>
<option value="12_months">Within 12 months</option>
</select>

<button onclick="generate()">Generate Preview</button>

<div id="loading" class="loader" style="display:none;">
Computing sovereign model...
</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>

async function generate() {

  const loading = document.getElementById("loading");
  const resultBox = document.getElementById("result");

  loading.style.display = "block";
  resultBox.style.display = "none";

  try {

    const response = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        citizenship: document.getElementById("citizenship").value,
        targetCountry: document.getElementById("target").value,
        income: document.getElementById("income").value,
        familyStatus: document.getElementById("family").value,
        timeline: document.getElementById("timeline").value
      })
    });

    const data = await response.json();

    loading.style.display = "none";
    resultBox.style.display = "block";

    resultBox.innerText = data.result;

    if (data.reportId) {
      const link = document.createElement("a");
      link.href = `/portal.html?report=${data.reportId}`;
      link.innerText = "Open Full Report →";
      link.style.display = "block";
      link.style.marginTop = "20px";
      link.style.color = "#4f8cff";
      resultBox.appendChild(link);
    }

  } catch (err) {
    loading.style.display = "none";
    resultBox.style.display = "block";
    resultBox.innerText = "Error:\n\n" + err.message;
  }
}

</script>

</body>
</html>
