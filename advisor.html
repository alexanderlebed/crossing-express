<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Relocation Advisor — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:70px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.box{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.1);
color:white;
border-radius:6px;
}

button{
margin-top:20px;
padding:14px 20px;
background:#4f8cff;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:30px;
padding:25px;
background:#0f1623;
border-radius:8px;
}

.country{
margin-top:10px;
font-size:18px;
}

.metric{
margin-top:15px;
opacity:0.85;
}

.warning{
color:#ff9b66;
font-weight:600;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Relocation Advisor</h1>

<p class="subtitle">
Evaluate realistic relocation options based on financial capacity and jurisdictional accessibility.
</p>

<div class="box">

<label>Annual Income (€)</label>
<input id="income" type="number" value="60000">

<label>Net Worth (€)</label>
<input id="wealth" type="number" value="120000">

<button id="runButton">Run Analysis</button>

<div id="result" class="result" style="display:none"></div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home →</a>
</div>

</div>

<script>

const countries=[

{name:"Serbia",tax:"Low",risk:"Moderate",difficulty:"Easy",income:15000,wealth:20000},
{name:"Montenegro",tax:"Low",risk:"Moderate",difficulty:"Easy",income:20000,wealth:30000},
{name:"Bulgaria",tax:"Low",risk:"Low",difficulty:"Easy",income:20000,wealth:30000},
{name:"Romania",tax:"Low",risk:"Low",difficulty:"Easy",income:20000,wealth:30000},

{name:"Thailand",tax:"Moderate",risk:"Moderate",difficulty:"Moderate",income:30000,wealth:50000},
{name:"Mexico",tax:"Moderate",risk:"Moderate",difficulty:"Moderate",income:30000,wealth:50000},

{name:"Portugal",tax:"High",risk:"Low",difficulty:"Moderate",income:45000,wealth:80000},
{name:"Spain",tax:"High",risk:"Low",difficulty:"Moderate",income:50000,wealth:100000},
{name:"Greece",tax:"Moderate",risk:"Moderate",difficulty:"Moderate",income:45000,wealth:80000},

{name:"Italy",tax:"High",risk:"Low",difficulty:"Moderate",income:60000,wealth:150000},
{name:"France",tax:"High",risk:"Low",difficulty:"Hard",income:65000,wealth:200000},

{name:"Canada",tax:"High",risk:"Low",difficulty:"Hard",income:80000,wealth:300000},
{name:"Netherlands",tax:"High",risk:"Low",difficulty:"Hard",income:90000,wealth:300000},

{name:"UAE",tax:"Very Low",risk:"Moderate",difficulty:"Moderate",income:100000,wealth:500000},
{name:"Switzerland",tax:"Moderate",risk:"Very Low",difficulty:"Hard",income:200000,wealth:2000000},
{name:"Singapore",tax:"Low",risk:"Very Low",difficulty:"Hard",income:250000,wealth:3000000}

]

function runAdvisor(){

let income=parseInt(document.getElementById("income").value)||0
let wealth=parseInt(document.getElementById("wealth").value)||0
let result=document.getElementById("result")

result.style.display="block"

if(income<15000 && wealth<20000){

result.innerHTML=
"<h3 class='warning'>Relocation currently unrealistic</h3>"+
"<p>Current income and capital are below minimum levels required for sustainable relocation.</p>"+
"<p>Estimated minimum relocation capital: €50k–€100k.</p>"

return
}

let possible=countries.filter(c=>income>=c.income && wealth>=c.wealth)

if(possible.length===0){

result.innerHTML=
"<h3 class='warning'>Limited relocation feasibility</h3>"+
"<p>Your current financial profile restricts relocation options.</p>"+
"<p>Recommended strategy: build savings and increase income before relocating.</p>"

return
}

possible.sort((a,b)=>a.income-b.income)

let html="<h3>Accessible Jurisdictions</h3>"

possible.slice(0,5).forEach((c,i)=>{

html+="<div class='country'>"+(i+1)+". "+c.name+"</div>"+
"<div class='metric'>Tax Pressure: "+c.tax+"</div>"+
"<div class='metric'>SVI Risk: "+c.risk+"</div>"+
"<div class='metric'>Residency Difficulty: "+c.difficulty+"</div><br>"

})

let mobility="Limited"

if(income>80000 && wealth>300000) mobility="Moderate"
if(income>200000 && wealth>2000000) mobility="High"

html+="<h3>Mobility Class</h3><div class='country'>"+mobility+"</div>"

result.innerHTML=html

}

document.getElementById("runButton").addEventListener("click",runAdvisor)

</script>

</body>
</html>
