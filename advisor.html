<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Relocation Advisor — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:70px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.box{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.1);
color:white;
border-radius:6px;
}

button{
margin-top:20px;
padding:14px 20px;
background:#4f8cff;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:30px;
padding:25px;
background:#0f1623;
border-radius:8px;
}

.country{
margin-top:10px;
font-size:18px;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Relocation Advisor</h1>

<p class="subtitle">
Evaluate optimal jurisdictions based on tax exposure, regulatory stability and geopolitical risk.
</p>

<div class="box">

<label>Annual Income (€)</label>
<input id="income" type="number" value="250000">

<label>Net Worth (€)</label>
<input id="wealth" type="number" value="5000000">

<label>Region Preference</label>
<select id="region">
<option value="Global">Global</option>
<option value="Europe">Europe</option>
<option value="Asia">Asia</option>
<option value="Americas">Americas</option>
<option value="Middle East">Middle East</option>
</select>

<button id="runButton">Run Analysis</button>

<div id="result" class="result" style="display:none"></div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home →</a>
</div>

</div>

<script>

const countries = [

{name:"Singapore",region:"Asia",svi:22,tax:1,geo:1,crime:1},
{name:"Switzerland",region:"Europe",svi:28,tax:2,geo:1,crime:1},
{name:"New Zealand",region:"Asia",svi:24,tax:2,geo:1,crime:1},
{name:"Japan",region:"Asia",svi:29,tax:2,geo:1,crime:1},
{name:"Austria",region:"Europe",svi:30,tax:2,geo:1,crime:1},

{name:"Netherlands",region:"Europe",svi:33,tax:3,geo:1,crime:1},
{name:"Germany",region:"Europe",svi:35,tax:3,geo:1,crime:1},
{name:"Portugal",region:"Europe",svi:36,tax:2,geo:1,crime:1},
{name:"Canada",region:"Americas",svi:34,tax:3,geo:1,crime:1},
{name:"United States",region:"Americas",svi:38,tax:3,geo:1,crime:2},

{name:"France",region:"Europe",svi:41,tax:4,geo:1,crime:2},
{name:"Spain",region:"Europe",svi:44,tax:4,geo:1,crime:2},
{name:"Italy",region:"Europe",svi:47,tax:4,geo:1,crime:2},
{name:"Cyprus",region:"Europe",svi:50,tax:2,geo:2,crime:2},
{name:"Greece",region:"Europe",svi:52,tax:2,geo:2,crime:2},

{name:"UAE",region:"Middle East",svi:34,tax:1,geo:2,crime:1},
{name:"Qatar",region:"Middle East",svi:32,tax:1,geo:2,crime:1},

{name:"Thailand",region:"Asia",svi:57,tax:2,geo:2,crime:2},
{name:"Malaysia",region:"Asia",svi:46,tax:2,geo:2,crime:2},
{name:"Indonesia",region:"Asia",svi:55,tax:2,geo:2,crime:2},
{name:"Vietnam",region:"Asia",svi:61,tax:2,geo:2,crime:2},

{name:"Chile",region:"Americas",svi:48,tax:2,geo:2,crime:2},
{name:"Mexico",region:"Americas",svi:60,tax:2,geo:2,crime:3},
{name:"Brazil",region:"Americas",svi:65,tax:3,geo:2,crime:3},
{name:"Argentina",region:"Americas",svi:74,tax:3,geo:2,crime:3}

]

function runAdvisor(){

const income = parseInt(document.getElementById("income").value) || 0
const wealth = parseInt(document.getElementById("wealth").value) || 0
const region = document.getElementById("region").value

let filtered = countries

if(region !== "Global"){
filtered = countries.filter(c => c.region === region)
}

let results = filtered.map(c => {

let score = 100

score -= c.svi
score -= c.tax * 6
score -= c.geo * 4
score -= c.crime * 3

if(income > 200000) score += 5
if(wealth > 2000000) score += 5

return {name:c.name,score:score}

})

results.sort((a,b)=>b.score-a.score)

let html = "<h3>Recommended Jurisdictions</h3>"

results.slice(0,5).forEach((r,i)=>{
html += "<div class='country'>" + (i+1) + ". " + r.name + " — Score " + r.score + "</div>"
})

let mobility = 60

if(income > 200000) mobility += 10
if(wealth > 2000000) mobility += 10

html += "<br><h3>Mobility Score</h3>"
html += "<div class='country'>" + mobility + " / 100</div>"

const resultBox = document.getElementById("result")

resultBox.innerHTML = html
resultBox.style.display = "block"

}

document.getElementById("runButton").addEventListener("click", runAdvisor)

</script>

</body>
</html>
