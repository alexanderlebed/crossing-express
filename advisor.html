<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Relocation Advisor — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:70px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.box{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.1);
color:white;
border-radius:6px;
}

button{
margin-top:20px;
padding:14px 20px;
background:#4f8cff;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:30px;
padding:25px;
background:#0f1623;
border-radius:8px;
}

.country{
margin-top:10px;
font-size:18px;
}

.warning{
color:#ff9b66;
font-weight:600;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Relocation Advisor</h1>

<p class="subtitle">
Evaluate realistic relocation options based on income, capital and jurisdictional accessibility.
</p>

<div class="box">

<label>Annual Income (€)</label>
<input id="income" type="number" value="50000">

<label>Net Worth (€)</label>
<input id="wealth" type="number" value="100000">

<button id="runButton">Run Analysis</button>

<div id="result" class="result" style="display:none"></div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home →</a>
</div>

</div>

<script>

const countries = [

{name:"Serbia",minIncome:15000,minWealth:20000},
{name:"Montenegro",minIncome:20000,minWealth:30000},
{name:"Bulgaria",minIncome:20000,minWealth:30000},
{name:"Romania",minIncome:20000,minWealth:30000},

{name:"Thailand",minIncome:30000,minWealth:50000},
{name:"Mexico",minIncome:30000,minWealth:50000},
{name:"Panama",minIncome:35000,minWealth:60000},

{name:"Portugal",minIncome:45000,minWealth:80000},
{name:"Spain",minIncome:50000,minWealth:100000},
{name:"Greece",minIncome:45000,minWealth:80000},

{name:"Italy",minIncome:60000,minWealth:150000},
{name:"France",minIncome:65000,minWealth:200000},

{name:"Canada",minIncome:80000,minWealth:300000},
{name:"Netherlands",minIncome:90000,minWealth:300000},

{name:"UAE",minIncome:100000,minWealth:500000},
{name:"Switzerland",minIncome:200000,minWealth:2000000},
{name:"Singapore",minIncome:250000,minWealth:3000000}

]

function runAdvisor(){

const income = parseInt(document.getElementById("income").value) || 0
const wealth = parseInt(document.getElementById("wealth").value) || 0

const resultBox = document.getElementById("result")

resultBox.style.display = "block"

if(income < 15000 && wealth < 20000){

resultBox.innerHTML = `
<h3 class="warning">Relocation currently not financially feasible</h3>
<p>
Current income and savings are below the minimum threshold required for sustainable relocation.
</p>
<p>
Estimated minimum financial base for relocation: <strong>€50k–€100k</strong> depending on jurisdiction.
</p>
`

return
}

let available = countries.filter(c =>
income >= c.minIncome && wealth >= c.minWealth
)

if(available.length === 0){

resultBox.innerHTML = `
<h3 class="warning">Limited relocation feasibility</h3>
<p>
Current financial profile restricts relocation options.
Consider building additional savings before relocating.
</p>
`

return
}

available.sort((a,b)=>a.minIncome - b.minIncome)

let html = "<h3>Accessible Jurisdictions</h3>"

available.slice(0,5).forEach((c,i)=>{
html += "<div class='country'>" + (i+1) + ". " + c.name + "</div>"
})

resultBox.innerHTML = html

}

document.getElementById("runButton").addEventListener("click", runAdvisor)

</script>

</body>
</html>
