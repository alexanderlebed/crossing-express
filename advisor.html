<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Relocation Advisor — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:70px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.box{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.1);
color:white;
border-radius:6px;
}

button{
margin-top:20px;
padding:14px 20px;
background:#4f8cff;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:30px;
padding:25px;
background:#0f1623;
border-radius:8px;
}

.country{
margin-top:12px;
font-size:18px;
}

.metric{
opacity:0.85;
margin-top:4px;
}

.warning{
color:#ff9b66;
font-weight:600;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Relocation Advisor</h1>

<p class="subtitle">
Evaluate relocation feasibility based on mobility model, income and capital.
</p>

<div class="box">

<label>Mobility Mode</label>
<select id="mode">
<option value="nomad">Digital Nomad</option>
<option value="professional">Skilled Professional</option>
<option value="capital">Capital Relocation</option>
<option value="wealth">Wealth Preservation</option>
</select>

<label>Annual Income (€)</label>
<input id="income" type="number" value="60000">

<label>Net Worth (€)</label>
<input id="wealth" type="number" value="120000">

<button id="runButton">Run Analysis</button>

<div id="result" class="result" style="display:none"></div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home →</a>
</div>

</div>

<script>

const countries = {

nomad:[
{name:"Portugal",tax:"Moderate",risk:"Low",difficulty:"Moderate"},
{name:"Spain",tax:"Moderate",risk:"Low",difficulty:"Moderate"},
{name:"Greece",tax:"Moderate",risk:"Moderate",difficulty:"Moderate"},
{name:"Thailand",tax:"Moderate",risk:"Moderate",difficulty:"Moderate"},
{name:"Mexico",tax:"Moderate",risk:"Moderate",difficulty:"Moderate"}
],

professional:[
{name:"Netherlands",tax:"High",risk:"Low",difficulty:"Hard"},
{name:"Germany",tax:"High",risk:"Low",difficulty:"Hard"},
{name:"Canada",tax:"High",risk:"Low",difficulty:"Hard"},
{name:"Portugal",tax:"Moderate",risk:"Low",difficulty:"Moderate"},
{name:"Spain",tax:"Moderate",risk:"Low",difficulty:"Moderate"}
],

capital:[
{name:"UAE",tax:"Very Low",risk:"Moderate",difficulty:"Moderate"},
{name:"Switzerland",tax:"Moderate",risk:"Very Low",difficulty:"Hard"},
{name:"Singapore",tax:"Low",risk:"Very Low",difficulty:"Hard"},
{name:"Netherlands",tax:"High",risk:"Low",difficulty:"Hard"},
{name:"Canada",tax:"High",risk:"Low",difficulty:"Hard"}
],

wealth:[
{name:"Switzerland",tax:"Moderate",risk:"Very Low",difficulty:"Hard"},
{name:"Singapore",tax:"Low",risk:"Very Low",difficulty:"Hard"},
{name:"UAE",tax:"Very Low",risk:"Moderate",difficulty:"Moderate"},
{name:"New Zealand",tax:"Moderate",risk:"Very Low",difficulty:"Hard"},
{name:"Monaco",tax:"Very Low",risk:"Very Low",difficulty:"Hard"}
]

}

function runAdvisor(){

let income=parseInt(document.getElementById("income").value)||0
let wealth=parseInt(document.getElementById("wealth").value)||0
let mode=document.getElementById("mode").value

let result=document.getElementById("result")
result.style.display="block"

if(mode==="nomad" && income<25000){

result.innerHTML=
"<h3 class='warning'>Income below typical digital nomad visa thresholds</h3>"+
"<p>Most nomad programs require ~€2k–€3k monthly income.</p>"

return
}

if(mode==="professional" && income<50000){

result.innerHTML=
"<h3 class='warning'>Income below skilled migration thresholds</h3>"+
"<p>Professional migration programs typically require €50k+ income.</p>"

return
}

if(mode==="capital" && wealth<300000){

result.innerHTML=
"<h3 class='warning'>Insufficient capital for investment-based relocation</h3>"+
"<p>Most programs require €300k–€500k capital.</p>"

return
}

if(mode==="wealth" && wealth<2000000){

result.innerHTML=
"<h3 class='warning'>Wealth preservation relocation usually requires €2M+</h3>"

return
}

let list=countries[mode]

let html="<h3>Recommended Jurisdictions</h3>"

list.forEach((c,i)=>{

html+="<div class='country'>"+(i+1)+". "+c.name+"</div>"+
"<div class='metric'>Tax Pressure: "+c.tax+"</div>"+
"<div class='metric'>SVI Risk: "+c.risk+"</div>"+
"<div class='metric'>Residency Difficulty: "+c.difficulty+"</div><br>"

})

result.innerHTML=html

}

document.getElementById("runButton").addEventListener("click",runAdvisor)

</script>

</body>
</html>
