<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVI Country Profile — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:80px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.card{
margin-top:25px;
padding:25px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
}

.score{
font-size:34px;
margin-top:10px;
}

.vector{
margin-top:12px;
opacity:0.9;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1 id="countryName"></h1>

<p class="subtitle">
SVI analytical country profile within the SRIM jurisdiction modeling framework.
</p>

<div class="card">

<h3>Sovereign Volatility Index</h3>

<div class="score" id="sviScore"></div>
<div id="sviClass"></div>

</div>

<div class="card">

<h3>Core Vectors</h3>

<div class="vector"><strong>Tax Pressure:</strong> <span id="tax"></span></div>
<div class="vector"><strong>Migration Accessibility:</strong> <span id="migration"></span></div>
<div class="vector"><strong>Residency Path:</strong> <span id="residency"></span></div>
<div class="vector"><strong>Geopolitical Risk:</strong> <span id="geo"></span></div>
<div class="vector"><strong>Crime & Safety:</strong> <span id="crime"></span></div>

</div>

<div class="card">

<h3>Mobility Score</h3>

<div class="score" id="mobilityScore"></div>

</div>

<div class="footer">

Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home</a>

</div>

</div>

<script>

const database={

spain:{name:"Spain",score:44,class:"Regulatory Fluidity",tax:2,migration:3,residency:3,geo:4,crime:4},

portugal:{name:"Portugal",score:36,class:"Managed Stability",tax:3,migration:4,residency:4,geo:4,crime:4},

france:{name:"France",score:41,class:"Managed Stability",tax:2,migration:3,residency:3,geo:4,crime:4},

italy:{name:"Italy",score:47,class:"Regulatory Fluidity",tax:2,migration:3,residency:3,geo:4,crime:3},

germany:{name:"Germany",score:35,class:"Managed Stability",tax:2,migration:3,residency:3,geo:4,crime:4},

netherlands:{name:"Netherlands",score:33,class:"Managed Stability",tax:2,migration:3,residency:3,geo:4,crime:4},

switzerland:{name:"Switzerland",score:28,class:"Structural Stability",tax:3,migration:2,residency:2,geo:5,crime:5},

austria:{name:"Austria",score:30,class:"Structural Stability",tax:3,migration:2,residency:2,geo:5,crime:5},

singapore:{name:"Singapore",score:22,class:"Structural Stability",tax:4,migration:2,residency:2,geo:5,crime:5},

uae:{name:"United Arab Emirates",score:34,class:"Managed Stability",tax:5,migration:4,residency:4,geo:3,crime:5},

newzealand:{name:"New Zealand",score:24,class:"Structural Stability",tax:3,migration:2,residency:2,geo:5,crime:5},

japan:{name:"Japan",score:29,class:"Structural Stability",tax:3,migration:2,residency:2,geo:4,crime:5},

thailand:{name:"Thailand",score:57,class:"Regulatory Fluidity",tax:3,migration:4,residency:4,geo:3,crime:3},

vietnam:{name:"Vietnam",score:61,class:"Systemic Volatility",tax:3,migration:3,residency:3,geo:3,crime:3}

}

function getParam(name){
let url=new URL(window.location.href)
return url.searchParams.get(name)
}

let key=getParam("c") || "spain"

key=key.toLowerCase()

function scoreText(v){

if(v==5)return "Very Low / Excellent"
if(v==4)return "Low"
if(v==3)return "Moderate"
if(v==2)return "High"
return "Very High"

}

let c=database[key]

document.getElementById("countryName").innerText=c.name
document.getElementById("sviScore").innerText=c.score
document.getElementById("sviClass").innerText=c.class

document.getElementById("tax").innerText=scoreText(c.tax)
document.getElementById("migration").innerText=scoreText(c.migration)
document.getElementById("residency").innerText=scoreText(c.residency)
document.getElementById("geo").innerText=scoreText(c.geo)
document.getElementById("crime").innerText=scoreText(c.crime)

let mobility=(c.tax+c.migration+c.residency+c.geo+c.crime)/5*20

document.getElementById("mobilityScore").innerText=Math.round(mobility)+"/100"

</script>

</body>
</html>
