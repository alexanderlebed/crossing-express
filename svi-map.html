<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVI Interactive Map — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:1100px;
margin:auto;
padding:80px 30px;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.map{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
}

.country{
padding:14px;
border-radius:6px;
cursor:pointer;
text-align:center;
font-size:14px;
transition:0.2s;
}

.country:hover{
transform:scale(1.05);
}

.stable{ background:#123d2a; }
.managed{ background:#0f2e4a; }
.fluid{ background:#4a3a0f; }
.volatility{ background:#4a250f; }
.instability{ background:#4a0f0f; }

.result{
margin-top:40px;
padding:25px;
border:1px solid rgba(255,255,255,0.1);
border-radius:8px;
display:none;
}

.score{
font-size:36px;
margin-top:10px;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>SVI Interactive Map</h1>

<p class="subtitle">
Click a jurisdiction to view its Sovereign Volatility Index classification.
</p>

<div class="map" id="map"></div>

<div class="result" id="result">

<h2 id="country"></h2>

<div class="score" id="score"></div>

<div id="class"></div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home</a>
</div>

</div>

<script>

const countries={

Portugal:{score:36},
Spain:{score:44},
France:{score:41},
Italy:{score:47},
Germany:{score:35},
Netherlands:{score:33},
Switzerland:{score:28},
Austria:{score:30},
Greece:{score:52},
Cyprus:{score:50},
Malta:{score:39},
Montenegro:{score:63},
Serbia:{score:58},

"United Arab Emirates":{score:34},
Qatar:{score:32},

Singapore:{score:22},
Japan:{score:29},
"South Korea":{score:37},
Thailand:{score:57},
Vietnam:{score:61},
Malaysia:{score:46},
Indonesia:{score:55},

"United States":{score:38},
Canada:{score:34},
Mexico:{score:60},
Chile:{score:48},
Brazil:{score:65},
Argentina:{score:74},
"Costa Rica":{score:43},
Panama:{score:45},
Uruguay:{score:40},

Australia:{score:27},
"New Zealand":{score:24}

};

function getClass(score){

if(score<=30) return ["Structural Stability","stable"];
if(score<=40) return ["Managed Stability","managed"];
if(score<=55) return ["Regulatory Fluidity","fluid"];
if(score<=70) return ["Systemic Volatility","volatility"];

return ["Structural Instability","instability"];

}

const map=document.getElementById("map");

for(const country in countries){

const score=countries[country].score;

const cls=getClass(score);

const div=document.createElement("div");

div.className="country "+cls[1];

div.innerText=country;

div.onclick=function(){

document.getElementById("result").style.display="block";

document.getElementById("country").innerText=country;

document.getElementById("score").innerText="SVI Score: "+score;

document.getElementById("class").innerText=cls[0];

};

map.appendChild(div);

}

</script>

</body>
</html>
