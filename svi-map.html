<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVI Jurisdiction Explorer — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:80px 30px;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

select{
width:100%;
padding:14px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.08);
border-radius:6px;
color:#e8ecf1;
font-size:16px;
}

.result{
margin-top:40px;
padding:30px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
transition:all .3s;
}

.score{
font-size:40px;
margin-top:10px;
font-weight:600;
}

.class{
margin-top:10px;
opacity:0.9;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

/* COLORS */

.stable{
background:rgba(60,180,120,0.12);
border-color:rgba(60,180,120,0.4);
}

.managed{
background:rgba(100,180,255,0.12);
border-color:rgba(100,180,255,0.4);
}

.fluid{
background:rgba(255,190,80,0.12);
border-color:rgba(255,190,80,0.4);
}

.volatility{
background:rgba(255,120,80,0.15);
border-color:rgba(255,120,80,0.45);
}

.instability{
background:rgba(255,70,70,0.18);
border-color:rgba(255,70,70,0.5);
}

</style>
</head>

<body>

<div class="container">

<h1>SVI Jurisdiction Explorer</h1>

<p class="subtitle">
Select a jurisdiction to view its indicative Sovereign Volatility Index score.
</p>

<select id="countrySelect">

<option value="">Select jurisdiction</option>

<option>Spain</option>
<option>Portugal</option>
<option>France</option>
<option>Italy</option>
<option>Germany</option>
<option>Netherlands</option>
<option>Switzerland</option>
<option>Austria</option>
<option>Greece</option>
<option>Cyprus</option>

<option>Montenegro</option>
<option>Serbia</option>
<option>Turkey</option>
<option>United Arab Emirates</option>
<option>Qatar</option>

<option>Thailand</option>
<option>Vietnam</option>
<option>Malaysia</option>
<option>Singapore</option>
<option>Indonesia</option>

<option>Japan</option>
<option>South Korea</option>

<option>United States</option>
<option>Canada</option>
<option>Mexico</option>

<option>Brazil</option>
<option>Chile</option>
<option>Argentina</option>

<option>Australia</option>
<option>New Zealand</option>

</select>

<div class="result" id="resultBox" style="display:none">

<h2 id="countryName"></h2>

<div class="score" id="sviScore"></div>

<div class="class" id="sviClass"></div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home</a>
</div>

</div>

<script>

const sviData={

Spain:44,
Portugal:36,
France:41,
Italy:47,
Germany:35,
Netherlands:33,
Switzerland:28,
Austria:30,
Greece:52,
Cyprus:50,

Montenegro:63,
Serbia:58,
Turkey:68,
"United Arab Emirates":34,
Qatar:32,

Thailand:57,
Vietnam:61,
Malaysia:46,
Singapore:22,
Indonesia:55,

Japan:29,
"South Korea":37,

"United States":38,
Canada:34,
Mexico:60,

Brazil:65,
Chile:48,
Argentina:74,

Australia:27,
"New Zealand":24

};

function classify(score){

if(score<=30) return ["Structural Stability","stable"];

if(score<=45) return ["Managed Stability","managed"];

if(score<=60) return ["Regulatory Fluidity","fluid"];

if(score<=75) return ["Systemic Volatility","volatility"];

return ["Structural Instability","instability"];

}

document.getElementById("countrySelect").addEventListener("change",function(){

const country=this.value;

if(!country) return;

const score=sviData[country];

const result=document.getElementById("resultBox");

const [label,color]=classify(score);

result.className="result "+color;

result.style.display="block";

document.getElementById("countryName").innerText=country;

document.getElementById("sviScore").innerText=score+" / 100";

document.getElementById("sviClass").innerText=label;

});

</script>

</body>
</html>
