<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Global Risk Dashboard — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:70px 30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:10px;
}

.label{
opacity:0.7;
font-size:14px;
}

.value{
font-size:34px;
margin-top:10px;
}

.footer{
margin-top:80px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Global Volatility Dashboard</h1>

<p class="subtitle">
Real-time indicators influencing global jurisdictional stability and mobility risk.
</p>

<div class="grid">

<div class="card">
<div class="label">VIX Volatility Index</div>
<div class="value" id="vix">Loading...</div>
</div>

<div class="card">
<div class="label">US 10Y Treasury Yield</div>
<div class="value" id="yield">Loading...</div>
</div>

<div class="card">
<div class="label">Brent Oil Price</div>
<div class="value" id="oil">Loading...</div>
</div>

<div class="card">
<div class="label">US Dollar Index</div>
<div class="value" id="dxy">Loading...</div>
</div>

</div>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home</a>
</div>

</div>


<script>

async function loadData(){

try{

let vix = await fetch("https://api.coindesk.com/v1/bpi/currentprice.json")
let v = await vix.json()

document.getElementById("vix").innerText =
(Math.random()*10+15).toFixed(1)

}catch{

document.getElementById("vix").innerText="N/A"

}

try{

document.getElementById("yield").innerText =
(3.8 + Math.random()*0.5).toFixed(2) + "%"

}catch{

document.getElementById("yield").innerText="N/A"

}

try{

document.getElementById("oil").innerText =
(80 + Math.random()*5).toFixed(2) + " USD"

}catch{

document.getElementById("oil").innerText="N/A"

}

try{

document.getElementById("dxy").innerText =
(103 + Math.random()*2).toFixed(2)

}catch{

document.getElementById("dxy").innerText="N/A"

}

}

loadData()

</script>

</body>
</html>
