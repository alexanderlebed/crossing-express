<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVI Jurisdiction Scan — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:800px;
margin:auto;
padding:80px 30px;
}

h1{
font-size:34px;
margin-bottom:20px;
}

.subtitle{
opacity:0.9;
line-height:1.7;
margin-bottom:40px;
}

form{
margin-top:40px;
}

label{
display:block;
margin-top:25px;
font-size:14px;
opacity:0.8;
}

input, select{
width:100%;
margin-top:8px;
padding:12px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.08);
border-radius:6px;
color:#e8ecf1;
}

button{
margin-top:40px;
padding:14px 20px;
background:#4f8cff;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.footer{
margin-top:80px;
opacity:0.6;
font-size:14px;
}

.footer a{

<body>

<div class="container">

<h1>SVI Jurisdiction Volatility Scan</h1>

<p class="subtitle">
Run an analytical scan evaluating jurisdictional stability, regulatory exposure and relocation feasibility within the SRIM modeling framework.
</p>

<form action="/purchase.html">

<label>Citizenship</label>
<input type="text" name="citizenship" placeholder="e.g. Canada">

<label>Current Country of Residence</label>
<input type="text" name="residence" placeholder="e.g. Spain">

<label>Annual Income Range</label>
<select name="income">
<option>€50k – €100k</option>
<option>€100k – €250k</option>
<option>€250k – €500k</option>
<option>€500k+</option>
</select>

<label>Primary Mobility Goal</label>
<select name="goal">
<option>Tax optimization</option>
<option>Residency diversification</option>
<option>Geopolitical risk reduction</option>
<option>Long-term relocation</option>
</select>

<label>Decision Timeline</label>
<select name="timeline">
<option>3–6 months</option>
<option>6–12 months</option>
<option>1–2 years</option>
</select>

<button type="submit">
Generate SRIM Intelligence Brief →
</button>

</form>

<div class="footer">
Crossing — Strategic Navigation Laboratory<br>

</div>

</div>
