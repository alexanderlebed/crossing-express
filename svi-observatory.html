<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVI Country Observatory — Crossing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#05070f;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:80px 30px;
}

h1{
font-size:36px;
margin-bottom:20px;
}

select{
margin-top:20px;
padding:12px;
background:#0f1623;
border:1px solid rgba(255,255,255,0.08);
color:white;
border-radius:6px;
width:320px;
}

.profile{
margin-top:40px;
padding:30px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
border-radius:8px;
}

.gauge{
margin-top:20px;
height:16px;
background:#111827;
border-radius:8px;
overflow:hidden;
}

.gauge-fill{
height:100%;
background:#4f8cff;
width:0%;
transition:width 0.6s ease;
}

.score{
font-size:26px;
margin-top:10px;
}

.class{
opacity:0.8;
margin-top:4px;
}

.footer{
margin-top:100px;
opacity:0.6;
}

.footer a{
color:#4f8cff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>SVI Country Observatory</h1>

<p>
Select a jurisdiction to view its Sovereign Volatility Index analytical profile.
</p>

<select id="countrySelect" onchange="loadCountry()">

<option value="">Select Country</option>

<option value="spain">Spain</option>
<option value="portugal">Portugal</option>
<option value="france">France</option>
<option value="italy">Italy</option>
<option value="germany">Germany</option>
<option value="netherlands">Netherlands</option>
<option value="greece">Greece</option>
<option value="malta">Malta</option>
<option value="cyprus">Cyprus</option>

<option value="switzerland">Switzerland</option>
<option value="austria">Austria</option>
<option value="czechia">Czech Republic</option>
<option value="hungary">Hungary</option>
<option value="poland">Poland</option>

<option value="montenegro">Montenegro</option>
<option value="serbia">Serbia</option>
<option value="uae">United Arab Emirates</option>
<option value="turkey">Turkey</option>
<option value="georgia">Georgia</option>

<option value="thailand">Thailand</option>
<option value="vietnam">Vietnam</option>
<option value="malaysia">Malaysia</option>
<option value="indonesia">Indonesia</option>
<option value="philippines">Philippines</option>

<option value="singapore">Singapore</option>
<option value="japan">Japan</option>
<option value="southkorea">South Korea</option>

<option value="usa">United States</option>
<option value="canada">Canada</option>
<option value="mexico">Mexico</option>
<option value="panama">Panama</option>
<option value="costarica">Costa Rica</option>

<option value="brazil">Brazil</option>
<option value="argentina">Argentina</option>

<option value="australia">Australia</option>
<option value="nz">New Zealand</option>

</select>

<div id="profile" class="profile">

Select a country to display SVI profile.

</div>

<div class="footer">

Crossing — Strategic Navigation Laboratory<br>
<a href="/">Return to Home</a>

</div>

</div>

<script>

const data = {

spain:{score:44,class:"Regulatory Fluidity",text:"EU jurisdiction with increasing tax transparency and evolving fiscal frameworks."},
portugal:{score:36,class:"Managed Stability",text:"Stable EU environment with favorable residency pathways."},
france:{score:41,class:"Managed Stability",text:"Institutionally stable but with complex fiscal structures."},
italy:{score:46,class:"Regulatory Fluidity",text:"Administrative complexity with evolving relocation incentives."},
germany:{score:39,class:"Managed Stability",text:"Highly predictable institutional environment."},
netherlands:{score:34,class:"Managed Stability",text:"Stable governance with structured tax reform."},
greece:{score:48,class:"Regulatory Fluidity",text:"Recovery-phase regulatory system with investor incentives."},
malta:{score:40,class:"Managed Stability",text:"Small jurisdiction with flexible residency frameworks."},
cyprus:{score:43,class:"Regulatory Fluidity",text:"Investment-friendly environment with evolving compliance."},

switzerland:{score:28,class:"Structural Stability",text:"Highly predictable regulatory environment."},
austria:{score:35,class:"Managed Stability",text:"Stable EU regulatory environment."},
czechia:{score:38,class:"Managed Stability",text:"Predictable regulatory system within EU."},
hungary:{score:52,class:"Regulatory Fluidity",text:"Frequent domestic regulatory adjustments."},
poland:{score:45,class:"Regulatory Fluidity",text:"Moderate volatility driven by political reforms."},

montenegro:{score:63,class:"Systemic Volatility",text:"Emerging jurisdiction with developing regulatory institutions."},
serbia:{score:60,class:"Systemic Volatility",text:"Rapid economic changes with regulatory unpredictability."},
uae:{score:29,class:"Structural Stability",text:"Highly competitive tax and residency environment."},
turkey:{score:70,class:"Structural Instability",text:"Macroeconomic volatility and regulatory unpredictability."},
georgia:{score:47,class:"Regulatory Fluidity",text:"Flexible pro-business regulatory environment."},

thailand:{score:57,class:"Regulatory Fluidity",text:"Moderate institutional volatility with evolving visa policy."},
vietnam:{score:61,class:"Systemic Volatility",text:"Rapid economic growth with regulatory unpredictability."},
malaysia:{score:49,class:"Regulatory Fluidity",text:"Stable infrastructure with evolving migration policy."},
indonesia:{score:54,class:"Regulatory Fluidity",text:"Large emerging economy with changing compliance frameworks."},
philippines:{score:55,class:"Regulatory Fluidity",text:"Institutional volatility with accessible residency options."},

singapore:{score:22,class:"Structural Stability",text:"One of the most predictable regulatory environments globally."},
japan:{score:30,class:"Structural Stability",text:"Highly stable governance and policy environment."},
southkorea:{score:33,class:"Managed Stability",text:"Predictable institutional framework."},

usa:{score:38,class:"Managed Stability",text:"Stable governance with complex tax reporting systems."},
canada:{score:34,class:"Managed Stability",text:"Highly transparent regulatory structures."},
mexico:{score:50,class:"Regulatory Fluidity",text:"Moderate institutional volatility."},
panama:{score:42,class:"Regulatory Fluidity",text:"Competitive residency frameworks."},
costarica:{score:40,class:"Managed Stability",text:"Stable democratic system."},

brazil:{score:58,class:"Regulatory Fluidity",text:"Large emerging economy with evolving regulation."},
argentina:{score:72,class:"Structural Instability",text:"High macroeconomic volatility."},

australia:{score:32,class:"Managed Stability",text:"Stable regulatory environment."},
nz:{score:24,class:"Structural Stability",text:"Highly predictable institutional governance."}

};

function loadCountry(){

const c=document.getElementById("countrySelect").value;
if(!c)return;

const d=data[c];
const width=d.score;

document.getElementById("profile").innerHTML=

"<h2>"+c.replace(/^\w/,m=>m.toUpperCase())+"</h2>"+

"<div class='score'>SVI Score: "+d.score+"</div>"+
"<div class='class'>"+d.class+"</div>"+

"<div class='gauge'><div class='gauge-fill' id='gauge'></div></div>"+

"<p style='margin-top:20px'>"+d.text+"</p>";

setTimeout(()=>{

document.getElementById("gauge").style.width=width+"%";

},100);

}

</script>

</body>
</html>
