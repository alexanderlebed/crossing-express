<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SRIM Client Brief</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0a0f18;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 30px;
}
.header {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 20px;
  margin-bottom: 40px;
}
.report {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 12px;
  line-height: 1.8;
  font-size: 15px;
}
.meta {
  opacity: 0.6;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>SRIM Intelligence File</h1>
<div class="meta">Confidential</div>
</div>

<div id="report" class="report">
Loading intelligence file...
</div>

</div>

<script>

function getPortalId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadReport() {

  const portalId = getPortalId();

  if (!portalId) {
    document.getElementById("report").innerText = "Invalid access.";
    return;
  }

  const response = await fetch("/api/getPortal?id=" + portalId);
  const data = await response.json();

  if (data.error) {
    document.getElementById("report").innerText = data.error;
    return;
  }

  let formatted = data.report
    .replace(/\*\*/g, "")
    .replace(/\n\n/g, "<br><br>");

  document.getElementById("report").innerHTML = formatted;
}

loadReport();

</script>

</body>
</html>
