<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SRIM Client Brief</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0a0f18;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 30px;
}
.header {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 20px;
  margin-bottom: 40px;
}
h1 { font-size: 26px; }
.meta {
  opacity: 0.6;
  font-size: 13px;
}
.report {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 12px;
  line-height: 1.8;
  font-size: 15px;
}
.section-title {
  margin-top: 30px;
  font-weight: 600;
}
.confidential {
  margin-top: 60px;
  opacity: 0.4;
  font-size: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>SRIM Client Brief</h1>
<div class="meta">
Confidential — Restricted Circulation
</div>
</div>

<div id="report" class="report">
Verifying payment and generating intelligence brief...
</div>

<div class="confidential">
SRIM — Sovereign Relocation Intelligence Modeling
</div>

</div>

<script>

function getSessionId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("session_id");
}

async function generatePortal() {

  const sessionId = getSessionId();

  if (!sessionId) {
    document.getElementById("report").innerText =
      "Invalid session. Please return to the report page.";
    return;
  }

  const profile = JSON.parse(localStorage.getItem("srimProfile"));

  const response = await fetch("/api/createPortal", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      session_id: sessionId,
      profile
    })
  });

  const data = await response.json();

  if (data.error) {
    document.getElementById("report").innerText = data.error;
    return;
  }

  let formatted = data.report
    .replace(/\*\*/g, "")
    .replace(/\n\n/g, "<br><br>");

  document.getElementById("report").innerHTML = formatted;
}

generatePortal();

</script>

</body>
</html>
