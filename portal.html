<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SRIM Client Brief</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0a0f18;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 30px;
}

.header {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 20px;
  margin-bottom: 40px;
}

h1 {
  font-size: 28px;
  letter-spacing: 1px;
}

.meta {
  opacity: 0.6;
  font-size: 13px;
  margin-top: 8px;
}

.report {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 12px;
  line-height: 1.8;
  font-size: 15px;
}

.section-title {
  margin-top: 30px;
  font-weight: 600;
  font-size: 16px;
}

.confidential {
  margin-top: 60px;
  opacity: 0.4;
  font-size: 12px;
  text-align: center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>SRIM Client Brief</h1>
<div class="meta">
Confidential — Restricted Circulation<br>
Generated by Sovereign Relocation Intelligence Modeling
</div>
</div>

<div id="report" class="report">
Generating full intelligence brief...
</div>

<div class="confidential">
SRIM — Sovereign Relocation Intelligence Modeling<br>
Private Analytical Memorandum
</div>

</div>

<script>

async function generateFullReport() {

  const profile = JSON.parse(localStorage.getItem("srimProfile"));

  if (!profile) {
    document.getElementById("report").innerText =
      "No profile found. Please restart from Intelligence Report.";
    return;
  }

  profile.mode = "full";

  const response = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(profile)
  });

  const data = await response.json();

  let formatted = data.result
    .replace(/\*\*/g, "")
    .replace(/(\d+\.\s.*?:)/g, "<div class='section-title'>$1</div>")
    .replace(/\n\n/g, "<br><br>");

  document.getElementById("report").innerHTML = formatted;
}

generateFullReport();

</script>

</body>
</html>
