<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SRIM Client Brief</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0a0f18;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 30px;
}
.header {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 20px;
  margin-bottom: 40px;
}
.report {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 12px;
  line-height: 1.8;
  font-size: 15px;
}
.meta {
  opacity: 0.6;
  font-size: 13px;
}
.pdf-link {
  margin-top: 20px;
  display: inline-block;
  color: #4f8cff;
  text-decoration: none;
  font-weight: 500;
}
.pdf-link:hover {
  text-decoration: underline;
}
.email-box {
  margin-top: 40px;
  padding: 25px;
  background: rgba(79,140,255,0.06);
  border: 1px solid rgba(79,140,255,0.3);
  border-radius: 10px;
}
.email-box input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #0d1117;
  border: 1px solid #30363d;
  color: white;
}
.email-box button {
  margin-top: 15px;
  padding: 12px 20px;
  background: linear-gradient(90deg, #4f8cff, #7a5cff);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}
.email-box button:hover {
  opacity: 0.9;
}
.status {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>SRIM Intelligence File</h1>
<div class="meta">Confidential</div>
<div id="pdfContainer"></div>
</div>

<div id="report" class="report">
Loading intelligence file...
</div>

<div class="email-box">
<h3>Receive a copy by email</h3>
<input type="email" id="emailInput" placeholder="Enter your email">
<button onclick="sendEmail()">Send Report</button>
<div id="emailStatus" class="status"></div>
</div>

</div>

<script>

function getReportId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("report");
}

let currentReportId = null;

async function loadReport() {

  const reportId = getReportId();
  currentReportId = reportId;

  if (!reportId) {
    document.getElementById("report").innerText = "Invalid access.";
    return;
  }

  const response = await fetch("/api/getPortal?report=" + reportId);
  const data = await response.json();

  if (data.error) {
    document.getElementById("report").innerText = data.error;
    return;
  }

  let formatted = data.content
    .replace(/\n\n/g, "<br><br>");

  document.getElementById("report").innerHTML = formatted;

  const pdfLink = document.createElement("a");
  pdfLink.href = "/api/exportPdf?report=" + reportId;
  pdfLink.className = "pdf-link";
  pdfLink.innerText = "Download PDF →";

  document.getElementById("pdfContainer").appendChild(pdfLink);
}

async function sendEmail() {

  const email = document.getElementById("emailInput").value;
  const status = document.getElementById("emailStatus");

  if (!email) {
    status.innerText = "Please enter an email.";
    return;
  }

  status.innerText = "Sending...";

  const response = await fetch("/api/sendEmail", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      report: currentReportId
    })
  });

  const data = await response.json();

  if (data.success) {
    status.innerText = "Report sent successfully.";
  } else {
    status.innerText = "Error: " + (data.error || "Failed to send.");
  }
}

loadReport();

</script>

</body>
</html>
